name: Auto-Sync DSA Dashboard

on:
  push:
    branches:
      - main
  # Allow running manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate Notes Stubs for New Problems
        run: python -X utf8 scripts/generate_notes.py

      - name: Update Stats and Dashboard
        run: python -X utf8 scripts/sync.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          # Check if there are any changes to commit
          if git diff-index --quiet HEAD; then
            echo "✅ No new changes to sync."
          else
            # The [skip ci] tag prevents this commit from triggering another run!
            git commit -m "chore: auto-sync dashboard and notes [skip ci]"
            git push
            echo "🚀 Successfully synced and pushed updates!"
          fi
